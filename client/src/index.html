<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<script type="text/javascript" src="./js/main.js"></script>

	<style type="text/css">
		body
		{
			font-family: Helvetica, Arial, sans-serif;
			background-color: #292D3E;
			color: #DEDEDE;
		}

		pre
		{
			font-size: 1vw;
		}
	</style>

	<title>Farragomate</title>
</head>
<body>
	<p><h3>Packet Builder</h3></p>

	<p>
		<label>Type:</label>
		<select id="packet-type" autocomplete="off"></select>
	</p>

	<p>
		<label>Command:</label>
		<select id="packet-command" autocomplete="off"></select>
	</p>

	<p>
		<label>Sequence:</label>
		<input id="packet-sequence" type="number" autocomplete="off" value="0">
	</p>

	<p>
		<label>Body:</label>
		<textarea id="packet-body" autocomplete="off" cols="100" rows="20"></textarea>
	</p>

	<p><button id="packet-send">Send</button></p>

	<pre id="socket-messages"></pre>
</body>
</html>
